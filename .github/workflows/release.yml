name: Build and Release Clever-Vpn

on:
  push:
    tags:
      - "v*.*.*-rc.*"
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Build mode: internal (no release), prerelease, or release"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - prerelease
          - release
      tag_name:
        description: "Required for all modes. internal/prerelease: v1.2.3-rc.N, release: v1.2.3"
        required: false
        type: string

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"
  CONFIGURATION: Release
  DEFAULT_INSTALLER_DOWNLOAD_BASE_URL: https://github.com/${{ github.repository }}/releases/download

jobs:
  validate_tag:
    name: Resolve Build Mode and Version
    runs-on: windows-latest
    outputs:
      semver: ${{ steps.parse.outputs.semver }}
      installer_version: ${{ steps.parse.outputs.installer_version }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      publish_release: ${{ steps.parse.outputs.publish_release }}
      tag_name: ${{ steps.parse.outputs.tag_name }}
      build_ref: ${{ steps.parse.outputs.build_ref }}
      installer_tag_name: ${{ steps.parse.outputs.installer_tag_name }}
    steps:
      - name: Checkout repository with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve mode, validate tag, and compute versions
        id: parse
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          if ($eventName -eq "workflow_dispatch") {
            $mode = "${{ inputs.release_mode }}"
            $tag = "${{ inputs.tag_name }}".Trim()
          } elseif ($eventName -eq "push") {
            $mode = "internal"
            $tag = "${{ github.ref_name }}".Trim()
          } else {
            Write-Error "Unsupported event '$eventName'. Expected workflow_dispatch or push(tag)."
            exit 1
          }

          if ($mode -notin @("internal", "prerelease", "release")) {
            Write-Error "Invalid release_mode '$mode'. Expected one of: internal, prerelease, release."
            exit 1
          }

          $publishRelease = "false"
          $isPrerelease = "false"
          $buildRef = "${{ github.sha }}"
          $installerTagName = ""
          $resolvedTagName = ""
          $semver = ""
          $installerVersion = ""

          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error "tag_name is required when release_mode is '$mode'."
            exit 1
          }

          $releaseRegex = '^v(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)$'
          $prereleaseRegex = '^v(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)-rc\.(?<rc>[1-9]\d*)$'

          if ($mode -in @("internal", "prerelease")) {
            if ($tag -notmatch $prereleaseRegex) {
              Write-Error "Invalid $mode tag '$tag'. Expected format: v<major>.<minor>.<patch>-rc.<n>"
              exit 1
            }
            $isPrerelease = if ($mode -eq "prerelease") { "true" } else { "false" }
          }

          if ($mode -eq "release") {
            if ($tag -notmatch $releaseRegex) {
              Write-Error "Invalid release tag '$tag'. Expected format: v<major>.<minor>.<patch>"
              exit 1
            }
            $isPrerelease = "false"
          }

          git rev-parse --verify --quiet "refs/tags/$tag" | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tag '$tag' does not exist in the repository."
            exit 1
          }

          if ($tag -match '^v(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)') {
            $semver = "$($Matches.major).$($Matches.minor).$($Matches.patch)"
          } else {
            Write-Error "Unable to parse semantic version from tag '$tag'."
            exit 1
          }

          $installerVersion = "$semver.0"
          $publishRelease = if ($mode -eq "internal") { "false" } else { "true" }
          $resolvedTagName = $tag
          $installerTagName = $tag
          $buildRef = "refs/tags/$tag"

          "semver=$semver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_version=$installerVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "publish_release=$publishRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag_name=$resolvedTagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "build_ref=$buildRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_tag_name=$installerTagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          Write-Host "Mode=$mode"
          Write-Host "BuildRef=$buildRef"
          Write-Host "TagName=$resolvedTagName"
          Write-Host "InstallerVersion=$installerVersion"
          Write-Host "PublishRelease=$publishRelease"

  build_msi:
    name: Build MSI (${{ matrix.platform }})
    needs: validate_tag
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
            output_dir: x86
          - platform: x64
            output_dir: x64
          - platform: ARM64
            output_dir: ARM64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_tag.outputs.build_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore Clever-Vpn.sln

      - name: Build MSI
        run: dotnet build MsiInstaller/MsiInstaller.wixproj -c ${{ env.CONFIGURATION }} -p:Platform=${{ matrix.platform }} -p:CleverVpnInstallerVersion=${{ needs.validate_tag.outputs.installer_version }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-msi-${{ matrix.platform }}
          path: MsiInstaller/bin/${{ matrix.output_dir }}/${{ env.CONFIGURATION }}/en-US/*.msi
          if-no-files-found: error
          retention-days: 7

  build_msix:
    name: Build MSIX (${{ matrix.platform }})
    needs: validate_tag
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
          - platform: x64
          - platform: ARM64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_tag.outputs.build_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set MSIX manifest version from resolved version
        shell: pwsh
        run: |
          $manifest = "Clever-Vpn/Package.appxmanifest"
          [xml]$xml = Get-Content -Path $manifest
          $xml.Package.Identity.Version = "${{ needs.validate_tag.outputs.installer_version }}"
          $xml.Save($manifest)
          Write-Host "MSIX Identity.Version set to ${{ needs.validate_tag.outputs.installer_version }}"

      - name: Restore solution
        run: dotnet restore Clever-Vpn.sln

      - name: Build MSIX
        run: dotnet build Clever-Vpn/Clever-Vpn.csproj -c ${{ env.CONFIGURATION }} -p:Platform=${{ matrix.platform }} -p:GenerateAppxPackageOnBuild=true -p:AppxBundle=Never -p:AppxPackageSigningEnabled=false -p:AppxPackageVersion=${{ needs.validate_tag.outputs.installer_version }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-msix-${{ matrix.platform }}
          path: Clever-Vpn/bin/Appx/**/*.msix
          retention-days: 7

  build_setup:
    name: Build Setup Bootstrapper (setup.exe)
    needs:
      - validate_tag
      - build_msi
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_tag.outputs.build_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve installer download base URL
        id: resolve_download_base_url
        shell: pwsh
        run: |
          $downloadBaseUrl = "${{ vars.INSTALLER_DOWNLOAD_BASE_URL }}"
          if ([string]::IsNullOrWhiteSpace($downloadBaseUrl)) {
            $downloadBaseUrl = "${{ env.DEFAULT_INSTALLER_DOWNLOAD_BASE_URL }}"
          }

          "download_base_url=$downloadBaseUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "setup.exe download base URL: $downloadBaseUrl"

      - name: Download MSI x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-msi-x86
          path: MsiInstaller/bin/x86/${{ env.CONFIGURATION }}/en-US

      - name: Download MSI x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-msi-x64
          path: MsiInstaller/bin/x64/${{ env.CONFIGURATION }}/en-US

      - name: Download MSI ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-msi-ARM64
          path: MsiInstaller/bin/ARM64/${{ env.CONFIGURATION }}/en-US

      - name: Build setup.exe bundle
        run: dotnet build SetupInstaller/SetupInstaller.wixproj -c ${{ env.CONFIGURATION }} -p:CleverVpnInstallerVersion=${{ needs.validate_tag.outputs.installer_version }} -p:InstallerTagName=${{ needs.validate_tag.outputs.installer_tag_name }} -p:InstallerDownloadBaseUrl=${{ steps.resolve_download_base_url.outputs.download_base_url }} -p:BuildMsiAllArchOnBuild=false

      - name: Upload setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-setup-bootstrapper
          path: SetupInstaller/bin/**/*.exe
          retention-days: 7

  bundle_msix:
    name: Create MSIX Bundle
    needs:
      - validate_tag
      - build_msix
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_tag.outputs.build_ref }}

      - name: Download all MSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-msix-*
          merge-multiple: true
          path: Clever-Vpn/bin/Appx/msix-input

      - name: List downloaded MSIX files
        shell: pwsh
        run: Get-ChildItem -Path 'Clever-Vpn/bin/Appx/msix-input' -Recurse -Filter '*.msix' | Select-Object FullName | Format-Table -AutoSize

      - name: Ensure makeappx is available
        shell: pwsh
        run: |
          if (-not (Get-Command makeappx.exe -ErrorAction SilentlyContinue)) {
            $sdkBinRoot = 'C:\Program Files (x86)\Windows Kits\10\bin'
            if (-not (Test-Path $sdkBinRoot)) {
              throw "Windows SDK bin root not found: $sdkBinRoot"
            }

            $candidate = Get-ChildItem -Path $sdkBinRoot -Directory |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName 'x64\makeappx.exe' } |
              Where-Object { Test-Path $_ } |
              Select-Object -First 1

            if (-not $candidate) {
              throw 'makeappx.exe not found under Windows Kits SDK paths'
            }

            $binDir = Split-Path $candidate -Parent
            "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Append
            $env:PATH = "$binDir;$env:PATH"
          }

          Write-Host "makeappx located: $(Get-Command makeappx.exe | Select-Object -ExpandProperty Source)"

      - name: Create MSIX bundle (x86/x64/arm64)
        shell: cmd
        run: |
          cd Clever-Vpn
          make-bundle.bat ${{ needs.validate_tag.outputs.installer_version }} bin/Appx/msix-input

      - name: Validate MSIX bundle output
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path "Clever-Vpn/bin/Appx/bundle" -Filter *.msixbundle -ErrorAction SilentlyContinue
          if (-not $bundle) {
            Write-Error "No .msixbundle found under Clever-Vpn/bin/Appx/bundle"
            exit 1
          }

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-msix-bundle
          path: |
            Clever-Vpn/bin/Appx/bundle/*.msixbundle
            Clever-Vpn/bin/Appx/msix-input/*.msix
          retention-days: 7

  publish_github_release:
    name: Publish GitHub Release
    if: ${{ needs.validate_tag.outputs.publish_release == 'true' }}
    needs:
      - validate_tag
      - build_msi
      - build_setup
      - bundle_msix
    runs-on: windows-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Create release from tag type
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate_tag.outputs.tag_name }}
          name: ${{ needs.validate_tag.outputs.tag_name }}
          prerelease: ${{ needs.validate_tag.outputs.prerelease }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.msix
            artifacts/**/*.msixbundle
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
