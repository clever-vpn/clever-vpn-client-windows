name: Build and Release Clever-Vpn

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"
  CONFIGURATION: Release

jobs:
  validate_tag:
    name: Validate Tag and Resolve Version
    runs-on: windows-latest
    outputs:
      semver: ${{ steps.parse.outputs.semver }}
      installer_version: ${{ steps.parse.outputs.installer_version }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
    steps:
      - name: Parse and validate tag
        id: parse
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $pattern = '^v(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)(?<pre>-[0-9A-Za-z.-]+)?$'

          if ($tag -notmatch $pattern) {
            Write-Error "Invalid tag: $tag. Expected v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-<prerelease>."
            exit 1
          }

          $semver = "$($Matches.major).$($Matches.minor).$($Matches.patch)"
          $installerVersion = "$semver.0"
          $isPrerelease = if ($Matches.pre) { "true" } else { "false" }

          "semver=$semver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_version=$installerVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build_msi:
    name: Build MSI (${{ matrix.platform }})
    needs: validate_tag
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
            output_dir: x86
          - platform: x64
            output_dir: x64
          - platform: ARM64
            output_dir: ARM64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore Clever-Vpn.sln

      - name: Build MSI
        run: dotnet build MsiInstaller/MsiInstaller.wixproj -c ${{ env.CONFIGURATION }} -p:Platform=${{ matrix.platform }} -p:CleverVpnInstallerVersion=${{ needs.validate_tag.outputs.installer_version }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-msi-${{ matrix.platform }}
          path: MsiInstaller/bin/${{ matrix.output_dir }}/${{ env.CONFIGURATION }}/en-US/*.msi
          if-no-files-found: error

  build_msix:
    name: Build MSIX (${{ matrix.platform }})
    needs: validate_tag
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
          - platform: x64
          - platform: ARM64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set MSIX manifest version from tag
        shell: pwsh
        run: |
          $manifest = "Clever-Vpn/Package.appxmanifest"
          [xml]$xml = Get-Content -Path $manifest
          $xml.Package.Identity.Version = "${{ needs.validate_tag.outputs.installer_version }}"
          $xml.Save($manifest)
          Write-Host "MSIX Identity.Version set to ${{ needs.validate_tag.outputs.installer_version }}"

      - name: Restore solution
        run: dotnet restore Clever-Vpn.sln

      - name: Build MSIX
        run: dotnet build Clever-Vpn/Clever-Vpn.csproj -c ${{ env.CONFIGURATION }} -p:Platform=${{ matrix.platform }} -p:GenerateAppxPackageOnBuild=true -p:AppxBundle=Never -p:AppxPackageSigningEnabled=false -p:AppxPackageVersion=${{ needs.validate_tag.outputs.installer_version }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-msix-${{ matrix.platform }}
          path: Clever-Vpn/bin/Appx/**/*.msix

  build_setup:
    name: Build Setup Bootstrapper (setup.exe)
    needs:
      - validate_tag
      - build_msi
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download MSI x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-msi-x86
          path: MsiInstaller/bin/x86/${{ env.CONFIGURATION }}/en-US

      - name: Download MSI x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-msi-x64
          path: MsiInstaller/bin/x64/${{ env.CONFIGURATION }}/en-US

      - name: Download MSI ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-msi-ARM64
          path: MsiInstaller/bin/ARM64/${{ env.CONFIGURATION }}/en-US

      - name: Build setup.exe bundle
        run: dotnet build SetupInstaller/SetupInstaller.wixproj -c ${{ env.CONFIGURATION }} -p:CleverVpnInstallerVersion=${{ needs.validate_tag.outputs.installer_version }} -p:BuildMsiAllArchOnBuild=false

      - name: Upload setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-setup-bootstrapper
          path: SetupInstaller/bin/**/*.exe

  bundle_msix:
    name: Create MSIX Bundle
    needs:
      - validate_tag
      - build_msix
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all MSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-msix-*
          merge-multiple: true
          path: Clever-Vpn/bin/Appx/msix-input

      - name: List downloaded MSIX files
        shell: pwsh
        run: Get-ChildItem -Path 'Clever-Vpn/bin/Appx/msix-input' -Recurse -Filter '*.msix' | Select-Object FullName | Format-Table -AutoSize

      - name: Ensure makeappx is available
        shell: pwsh
        run: |
          if (-not (Get-Command makeappx.exe -ErrorAction SilentlyContinue)) {
            $sdkBinRoot = 'C:\Program Files (x86)\Windows Kits\10\bin'
            if (-not (Test-Path $sdkBinRoot)) {
              throw "Windows SDK bin root not found: $sdkBinRoot"
            }

            $candidate = Get-ChildItem -Path $sdkBinRoot -Directory |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName 'x64\makeappx.exe' } |
              Where-Object { Test-Path $_ } |
              Select-Object -First 1

            if (-not $candidate) {
              throw 'makeappx.exe not found under Windows Kits SDK paths'
            }

            $binDir = Split-Path $candidate -Parent
            "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Append
            $env:PATH = "$binDir;$env:PATH"
          }

          Write-Host "makeappx located: $(Get-Command makeappx.exe | Select-Object -ExpandProperty Source)"

      - name: Create MSIX bundle (x86/x64/arm64)
        shell: cmd
        run: |
          cd Clever-Vpn
          make-bundle.bat ${{ needs.validate_tag.outputs.installer_version }} bin/Appx/msix-input

      - name: Validate MSIX bundle output
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path "Clever-Vpn/bin/Appx/bundle" -Filter *.msixbundle -ErrorAction SilentlyContinue
          if (-not $bundle) {
            Write-Error "No .msixbundle found under Clever-Vpn/bin/Appx/bundle"
            exit 1
          }

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-msix-bundle
          path: |
            Clever-Vpn/bin/Appx/bundle/*.msixbundle
            Clever-Vpn/bin/Appx/msix-input/*.msix

  publish_github_release:
    name: Publish GitHub Release
    needs:
      - validate_tag
      - build_msi
      - build_setup
      - bundle_msix
    runs-on: windows-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Create release from tag type
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ needs.validate_tag.outputs.prerelease }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.msix
            artifacts/**/*.msixbundle
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
